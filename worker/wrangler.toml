name = "booklens-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

# Enables Cloudflare Workers AI binding
[ai]
binding = "AI"

# Environment variables
# Add your Google Books API key here (optional but recommended for higher rate limits)
# Get one free at: https://console.cloud.google.com/apis/library/books.googleapis.com
[vars]
# ALLOWED_ORIGIN — set to your Pages domain to lock down CORS (e.g. https://your-app.pages.dev)
# Store as a secret in production: wrangler secret put ALLOWED_ORIGIN
# Key is stored as a Wrangler secret — run: wrangler secret put GOOGLE_BOOKS_API_KEY

[observability]
enabled = true

[observability.logs]
invocation_logs = true

[observability.traces]
enabled = true

# For local development: wrangler dev
# To deploy: wrangler deploy
